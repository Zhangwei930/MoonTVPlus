name = "magies-tv-plus"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
minify = true

[[routes]]
pattern = "tv.magies.top"
custom_domain = true

# 静态资源配置
# Cloudflare Workers Assets 用于服务静态文件
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "moontvplus"
database_id = "a3e458f7-2d17-4633-9515-991bd746e63b"

[vars]
NODE_ENV = "production"
BUILD_TARGET = "cloudflare"
NEXT_PUBLIC_SITE_NAME = "MagiesTvPlus"
NEXT_PUBLIC_STORAGE_TYPE = "d1"
USERNAME = "admin"
